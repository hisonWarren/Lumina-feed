name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Optional override tag (e.g. v0.4.85). Leave empty to use package.json."
        required: false
        type: string

permissions:
  contents: write

jobs:
  resolve-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve release version
        id: meta
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            TAG="${{ github.event.inputs.version }}"
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            TAG="${GITHUB_REF_NAME}"
          else
            TAG="v$(node -p "require('./package.json').version")"
          fi
          if [[ ! "$TAG" =~ ^v ]]; then
            TAG="v${TAG}"
          fi
          VER="${TAG#v}"
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Release tag: $TAG (version $VER)"

  build:
    needs: resolve-version
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
            artifact: lumina-feed-mac
          - os: ubuntu-latest
            platform: linux
            artifact: lumina-feed-linux
          - os: windows-latest
            platform: win
            artifact: lumina-feed-win

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate package.json version matches tag
        shell: bash
        run: |
          PKG_VER=$(node -p "require('./package.json').version")
          if [ "$PKG_VER" != "${{ needs.resolve-version.outputs.version }}" ]; then
            echo "package.json version ($PKG_VER) does not match tag (${{ needs.resolve-version.outputs.version }})"
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install Linux build dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools libsecret-1-dev rpm

      - name: Install dependencies
        run: npm ci

      - name: Build installers (Windows)
        if: matrix.platform == 'win'
        shell: bash
        env:
          CSC_LINK_SECRET: ${{ secrets.WIN_CSC_LINK }}
          CSC_KEY_PASSWORD_SECRET: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
        run: |
          # Only enable code signing when a certificate secret is actually provided;
          # otherwise electron-builder treats an empty CSC_LINK as an invalid file path.
          if [ -n "$CSC_LINK_SECRET" ]; then
            export CSC_LINK="$CSC_LINK_SECRET"
            export CSC_KEY_PASSWORD="$CSC_KEY_PASSWORD_SECRET"
          fi
          # Build locally only; the publish job uploads a single asset set.
          npm run build:electron && npx electron-builder --publish never

      - name: Build installers (macOS)
        if: matrix.platform == 'mac'
        shell: bash
        env:
          CSC_LINK_SECRET: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD_SECRET: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -n "$CSC_LINK_SECRET" ]; then
            export CSC_LINK="$CSC_LINK_SECRET"
            export CSC_KEY_PASSWORD="$CSC_KEY_PASSWORD_SECRET"
          else
            export CSC_IDENTITY_AUTO_DISCOVERY=false
          fi
          npm run build:electron && npx electron-builder --publish never

      - name: Build installers (Linux)
        if: matrix.platform == 'linux'
        shell: bash
        run: npm run build:electron && npx electron-builder --publish never

      - name: Upload platform artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            release/*.exe
            release/*.exe.blockmap
            release/*.dmg
            release/*.dmg.blockmap
            release/*.AppImage
            release/latest.yml
            release/latest-mac.yml
            release/latest-linux.yml
          if-no-files-found: error
          retention-days: 14

  publish:
    needs: [resolve-version, build]
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List release assets
        run: find artifacts -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve-version.outputs.tag }}
          name: Lumina Feed ${{ needs.resolve-version.outputs.version }}
          generate_release_notes: true
          files: artifacts/**
          draft: false
          prerelease: false
